{% extends 'main.html' %}

{% block content %}
  <h1>Add Skill</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Add</button>
  </form>

  <script>
    function showSkills(element) {
        element.size = 20;  // Set the size to display multiple options
    }

    function hideSkills(element) {
        element.size = 1;  // Set the size to hide options
    }
  </script>
{% endblock %}
