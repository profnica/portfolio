{% extends 'main.html' %}

{% block content %}
  <h1>Skills</h1>
  <ul>
    {% for skill in skills %}
      <li>{{ skill}}</li>
      <li><a href="{% url 'skill_edit' skill.id %}">Edit</a></li>
      <li><a href="{% url 'skill_delete' skill.id %}">Delete</a></li>
    {% endfor %}
  </ul>
  <a href="{% url 'skill_add' %}">Add</a>
{% endblock %}
